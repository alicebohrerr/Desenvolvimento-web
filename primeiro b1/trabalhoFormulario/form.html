<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Formulário de Cadastro </title>
</head>
<header>

    <h1> Página de Cadastro </h1>

</header>

<body>
    <form>

        <fieldset>
            <legend> Crie sua conta </legend>

  <label for = "nome" > Nome Completo: </label> <br>
  <input  type="text" name="nome" placeholder="Insira seu nome completo">

  <br> <br>

  <label for = "email" > E-mail: </label> <br>
  <input type = "email" name=" email" placeholder=" Insira seu E-mail">

  <br> <br>

  <label for = "senha" > senha (mínimo 8 caracteres):</label> <br>
  <input type = "password" name = "senha" required minlength="8" >

<br> <br>

<label for = "genero " > <b>Gênero:</b>  </label> <br>

<input type = "radio" name = "genero" value = "masculino" > Masculino <br>
<input type = "radio" name = "genero" value = "feminino" > Feminino <br>
<input type = "radio" name = "genero" value = "outro" > Outro

<br> <br>

<label for = "descrição" > Biografia: </label> <br>
<textarea name = "descrição "  rows = "5" placeholder = " Fale um pouco sobre você "></textarea>
<br> <br>


<input type = "checkbox"  name = "termos"  required> Eu li e aceito os termos de uso. <br> 


        </fieldset>

        <input type = "submit" value = "Cadastrar">
<input type = "reset" value = "Limpar">




    </form>
</body>
</html>
